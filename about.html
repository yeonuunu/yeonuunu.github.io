<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Music Playlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">

  <!-- 헤더 -->
  <header class="header">
    <h1 class="header__title">
      My <span class="header__icon">🎧</span><br>Music Playlist
    </h1>
  </header>

  <!-- 카드 영역 (1~3위) — JS가 채워줌 -->
  <section class="cards-row" id="cards-row"></section>

  <!-- 리스트 영역 (4위~) — JS가 채워줌 -->
  <section class="list-section" id="list-section"></section>

  <!-- 곡 추가 버튼 -->
  <div class="add-btn-wrap">
    <button class="add-btn" id="add-btn" title="곡 추가">＋</button>
  </div>

</div>

<!-- 곡 추가 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal__close" id="modal-close">✕</button>
    <p class="modal__title">✏️ 곡 추가하기</p>
    <div class="modal__field">
      <label class="modal__label" for="input-title">노래 제목</label>
      <input class="modal__input" id="input-title" type="text" placeholder="ex. Shrink" />
    </div>
    <div class="modal__field">
      <label class="modal__label" for="input-artist">아티스트</label>
      <input class="modal__input" id="input-artist" type="text" placeholder="ex. HONNE" />
    </div>
    <div class="modal__actions">
      <button class="btn btn--ghost"    id="modal-cancel">취소</button>
      <button class="btn btn--primary"  id="modal-confirm">추가 ♡</button>
    </div>
  </div>
</div>

<!-- 토스트 메시지 -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
